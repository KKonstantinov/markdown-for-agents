run-name:
    "${{ github.event_name == 'push' && format('CI · main · {0}', github.event.head_commit.message) || format('CI · PR #{0} · {1}',
    github.event.pull_request.number, github.event.pull_request.title) }}"

on:
    push:
        branches: [main]
        paths-ignore:
            - 'python/**'
            - '.github/workflows/python-ci.yml'
            - '.github/workflows/python-release.yml'
    pull_request:
        branches: [main]
        paths-ignore:
            - 'python/**'
            - '.github/workflows/python-ci.yml'
            - '.github/workflows/python-release.yml'

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm lint
            - run: pnpm format:check
            - run: pnpm typecheck

    test-unit:
        name: Unit Tests
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node-version: [22, 24]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm test

    test-integration:
        name: Integration · ${{ matrix.runtime }}
        runs-on: ubuntu-latest
        needs: test-unit
        strategy:
            fail-fast: false
            matrix:
                runtime: [node, bun, deno]
        steps:
            - uses: actions/checkout@v6
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: pnpm
            - uses: oven-sh/setup-bun@v2
              if: matrix.runtime == 'bun'
              with:
                  bun-version: latest
            - uses: denoland/setup-deno@v2
              if: matrix.runtime == 'deno'
              with:
                  deno-version: v2.x
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - run: pnpm --filter markdown-for-agents test:integration:${{ matrix.runtime }}
            - name: Middleware integration tests
              if: matrix.runtime == 'node'
              run: pnpm --filter './packages/middleware/*' run test:integration
            - name: Example integration tests
              if: matrix.runtime == 'node'
              run: pnpm --filter './examples/*' run test:integration
