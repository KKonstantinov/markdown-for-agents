name: Python Release

on:
    push:
        tags: ['python-v*']
    workflow_dispatch:

jobs:
    publish:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        environment: pypi
        permissions:
            id-token: write
        steps:
            - uses: actions/checkout@v6
            - uses: astral-sh/setup-uv@v6
              with:
                  enable-cache: true
            - name: Build package
              working-directory: python
              run: uv build
            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: python/dist/
